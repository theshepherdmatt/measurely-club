<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Measurely Club: Acoustic Consultation for Bars &amp; Clubs</title>

<link rel="stylesheet" href="./styles.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">

<style>
  :root {
    --viewport-bg: #0A0A0A;
    --brand-accent: #3A9D93;
  }
  html, body { margin: 0; height: 100%; background: var(--viewport-bg); font-family: 'DM Sans', system-ui, sans-serif; }
  #appShell { display: flex; width: 100vw; height: 100vh; }
  #roomViewport { flex: 1 1 auto; min-width: 0; height: 100%; background: var(--viewport-bg); }
  #sidebar {
    width: 320px;
    flex: 0 0 320px;
    height: 100%;
    background: #ffffff;
    overflow-y: auto;
    padding: 24px 20px;
    box-sizing: border-box;
  }
  .club-group-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #aaaaaa;
    margin: 0 0 12px;
  }
  .club-section { margin-bottom: 28px; }
</style>

<script type="importmap">
{
    "imports": {
        "three": "./engine/js/vendor/three/three.module.js"
    }
}
</script>

<script src="./engine/js/vendor/three/three.min.js" defer></script>
<script src="./engine/js/vendor/three/OrbitControls.js" defer></script>
<script src="./engine/js/treatment-registry.js"></script>
<script src="./engine/js/engine/treatments.js"></script>
<script src="./engine/js/engine/materials/database.js?v=1"></script>
<script src="./engine/js/engine/materials/index.js?v=1"></script>
<script src="./engine/js/engine/materials/surfaces.js?v=1"></script>
<script src="./engine/js/engine/imageSource.js"></script>
<script src="./engine/js/engine/acoustics.js?v=1"></script>
<script src="./engine/js/sidebar-component-library.js?v=1"></script>
</head>
<body>

<div id="appShell">
  <div id="roomViewport"></div>
  <div id="sidebar">
    <div class="club-section">
      <div class="club-group-label">Venue dimensions</div>
      <div id="roomMount"></div>
    </div>
    <div class="club-section">
      <div class="club-group-label">PA rig</div>
      <div id="clubSpeakersMount"></div>
    </div>
    <div class="club-section">
      <div class="club-group-label">Dance floor</div>
      <div id="clubMount"></div>
    </div>
  </div>
</div>

<script type="module" src="./app.js?v=1"></script>
</body>
</html>
